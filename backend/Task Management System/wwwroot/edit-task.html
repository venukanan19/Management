<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Edit Task</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <h1>Edit Task</h1>

    <nav>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="tasks.html">View Tasks</a></li>
            <li><a href="users.html">Manage Users</a></li>
        </ul>
    </nav>

    <form id="editTaskForm" onsubmit="submitEditTask(event)">
        <input type="hidden" id="taskId" />

        <label for="title">Title</label><br>
        <input type="text" id="title" maxlength="200" /><br><br>

        <label for="description">Description</label><br>
        <textarea id="description" maxlength="500"></textarea><br><br>

        <label for="status">Status</label><br>
        <select id="status">
            <option value="Todo">Todo</option>
            <option value="In Progress">In Progress</option>
            <option value="Done">Done</option>
        </select><br><br>

        <label for="userId">Assign To</label><br>
        <select id="userId">
            <option value="">Loading users...</option>
        </select><br><br>

        <button type="submit">Save Changes</button>
        <a href="tasks.html">Cancel</a>
    </form>

    <script src="app.js"></script>
    <script>
    loadTaskForEdit();
    </script>
</body>
</html>
